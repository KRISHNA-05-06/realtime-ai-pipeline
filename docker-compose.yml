# Real-Time AI Event Intelligence Pipeline
# Full stack: streaming + AI enrichment + storage + orchestration + batch.
#
# For a production multi-broker Kafka cluster, see docker-compose.prod.yml
# (3 brokers, replication factor 3). This file runs a single broker for local dev.

services:
  # ───────── Streaming backbone ─────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [pipeline]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MIN_INSYNC_REPLICAS: 1
    networks: [pipeline]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    networks: [pipeline]

  # ───────── Storage ─────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse_init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: pipeline
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    networks: [pipeline]

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    networks: [pipeline]

  # ───────── AI enrichment ─────────
  ai-service:
    build: { context: ./ai_service, dockerfile: Dockerfile }
    container_name: ai-service
    restart: unless-stopped
    ports: ["8001:8001"]
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379
    volumes:
      - model_store:/app/model     # shared with Airflow retrain DAG
    depends_on: [redis]
    networks: [pipeline]

  # ───────── Stream processor ─────────
  stream-processor:
    build: { context: ./flink_jobs, dockerfile: Dockerfile }
    container_name: stream-processor
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      AI_SERVICE_URL: http://ai-service:8001
      REDIS_URL: redis://redis:6379
      BOT_WINDOW_S: "60"
      BOT_THRESHOLD: "40"
      ANOMALY_THRESHOLD: "0.80"
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-events}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on: [kafka, clickhouse, redis, ai-service]
    networks: [pipeline]

  producer:
    build: { context: ./producer, dockerfile: Dockerfile }
    container_name: producer
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      EVENTS_PER_SECOND: "50"
      ANOMALY_RATE: "0.05"
    depends_on: [kafka]
    networks: [pipeline]

  # ───────── Serving ─────────
  api:
    build: { context: ./api, dockerfile: Dockerfile }
    container_name: api
    restart: unless-stopped
    ports: ["8000:8000"]
    environment:
      API_KEY: dev-key-change-in-prod
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      REDIS_URL: redis://redis:6379
    depends_on: [clickhouse, redis]
    networks: [pipeline]

  dashboard:
    build: { context: ./dashboard, dockerfile: Dockerfile }
    container_name: dashboard
    restart: unless-stopped
    ports: ["3001:80"]
    depends_on: [api]
    networks: [pipeline]

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on: [clickhouse]
    networks: [pipeline]

  # ───────── Orchestration (Airflow) ─────────
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: [airflow_db_data:/var/lib/postgresql/data]
    networks: [pipeline]

  airflow:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow
    restart: unless-stopped
    depends_on: [airflow-db, clickhouse]
    ports: ["8080:8080"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "clickhouse-connect==0.7.0 scikit-learn==1.4.0 numpy==1.26.3 joblib==1.3.2"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - model_store:/opt/airflow/model     # shared with ai-service
    command: >
      bash -c "airflow db migrate && airflow users create --username admin 
      --password admin123 --firstname Admin --lastname User --role Admin 
      --email admin@pipeline.com 2>/dev/null || true && airflow scheduler & airflow webserver"
    networks: [pipeline]

volumes:
  clickhouse_data:
  redis_data:
  grafana_data:
  airflow_db_data:
  model_store:

networks:
  pipeline:
    driver: bridge
