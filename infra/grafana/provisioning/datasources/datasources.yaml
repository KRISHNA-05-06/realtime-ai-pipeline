apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      host: clickhouse
      port: 8123
      username: admin
      defaultDatabase: pipeline
      protocol: http
    secureJsonData:
      password: admin123
    isDefault: true
    editable: true

  - name: Redis
    type: redis-datasource
    url: redis://redis:6379
    editable: true
